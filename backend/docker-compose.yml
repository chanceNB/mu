services:
  mysql:
    image: mysql:8.0
    container_name: learning-os-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-learning_os}
      MYSQL_USER: ${MYSQL_USER:-learning_os}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-learning_os}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-learning_os_root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: learning-os-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:RELEASE.2026-05-29T00-45-19Z
    container_name: learning-os-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  minio-data:
